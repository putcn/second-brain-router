version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sbr-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + dashboard
      - "6334:6334"   # gRPC (used by sbr-daemon)
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

volumes:
  qdrant_storage:
